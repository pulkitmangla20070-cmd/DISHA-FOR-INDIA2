services:
  # Single Web Service: builds client, serves it via Express
  - type: web
    name: disha-for-india
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
    healthCheckPath: /api/v1/health
    autoDeploy: true
